name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-lock.txt
      - run: pip install -e .
      - run: python scripts/validate_examples.py
      - run: python scripts/validate_learning_paths.py
      - run: python scripts/validate_feed_descriptors.py
      - run: python scripts/validate_audit_bundle.py examples/exported_audit_bundle.signed.json --trust-anchors data/trust_anchors.json
      - run: python scripts/replay_audit_bundle.py examples/reproducibility_bundle_standard.json --trusted-root .
      - run: python scripts/validate_photography_contest_example.py
      - run: python scripts/export_conformance_pack.py --check
      - run: python scripts/generate_release_checksums.py --check
      - run: pytest -q

version: '1.0'
threats:
- id: THR-GW-001
  title: Gateway route substitution
  adversary_ids:
  - ADV-05
  - ADV-07
  surface_ids:
  - SURF-GATEWAY
  impact: critical
  likelihood: medium
  controls:
    preventive:
    - signed route descriptors
    - authority pinning
    detective:
    - route evidence in receipt
    - route mismatch alert
    recovery:
    - route-key revocation
    - cache invalidation
  evidence:
  - mediation trace
  - route descriptor digest
  tests:
  - test_gateway_route_mismatch
  test_status: planned
  residual_risk: medium
  assurance_level: AL3
- id: THR-REG-002
  title: Registry equivocation
  adversary_ids:
  - ADV-04
  surface_ids:
  - SURF-REGISTRY
  impact: critical
  likelihood: medium
  controls:
    preventive:
    - signed responses
    - policy epoch binding
    detective:
    - cross-observer digest comparison
    recovery:
    - distrust registry
    - re-evaluate affected decisions
  evidence:
  - response digest
  - equivocation report
  tests:
  - test_registry_equivocation_vector
  test_status: planned
  residual_risk: medium
  assurance_level: AL4
- id: THR-CACHE-003
  title: Cache poisoning or tenant collision
  adversary_ids:
  - ADV-05
  - ADV-08
  surface_ids:
  - SURF-CACHE
  impact: high
  likelihood: medium
  controls:
    preventive:
    - canonical scoped keys
    - tenant isolation
    detective:
    - cache provenance
    - mismatch metrics
    recovery:
    - targeted invalidation
    - live re-query
  evidence:
  - cache key digest
  - source authority
  tests:
  - test_no_cross_authority_cache_collision
  test_status: implemented
  residual_risk: low
  assurance_level: AL2
- id: THR-PARSER-004
  title: Parser resource exhaustion
  adversary_ids:
  - ADV-01
  - ADV-10
  surface_ids:
  - SURF-PARSER
  - SURF-HTTP
  impact: high
  likelihood: high
  controls:
    preventive:
    - request size limit
    - parser resource budget
    detective:
    - latency and saturation alerts
    recovery:
    - quarantine input
    - shed load
  evidence:
  - request rejection event
  - resource metrics
  tests:
  - test_request_size_limit
  test_status: implemented
  residual_risk: medium
  assurance_level: AL2
- id: THR-EVID-005
  title: Audit bundle exfiltration
  adversary_ids:
  - ADV-07
  - ADV-08
  surface_ids:
  - SURF-EVIDENCE
  - SURF-HTTP
  impact: high
  likelihood: medium
  controls:
    preventive:
    - privileged export scope
    - minimal receipt default
    detective:
    - export audit event
    recovery:
    - revoke access
    - incident response
  evidence:
  - privacy profile
  - access decision
  - export event
  tests:
  - test_replay_bundle_requires_scope
  test_status: implemented
  residual_risk: low
  assurance_level: AL2
- id: THR-GOV-006
  title: Governance policy capture
  adversary_ids:
  - ADV-12
  surface_ids:
  - SURF-GOV
  impact: critical
  likelihood: medium
  controls:
    preventive:
    - multi-party approval
    - published criteria
    detective:
    - change audit
    - appeal metrics
    recovery:
    - revoke policy
    - restore prior profile
  evidence:
  - approval record
  - profile digest
  - appeal record
  tests:
  - test_governance_override_has_expiry
  test_status: planned
  residual_risk: high
  assurance_level: AL4
- id: THR-SUPPLY-007
  title: Build or dependency compromise
  adversary_ids:
  - ADV-09
  surface_ids:
  - SURF-SUPPLY
  impact: critical
  likelihood: medium
  controls:
    preventive:
    - dependency pinning
    - least-privilege CI
    - protected workflows
    detective:
    - artifact checksum verification
    - dependency and workflow review
    recovery:
    - revoke compromised credentials
    - rebuild and republish from trusted source
  evidence:
  - dependency lockfile
  - CI run record
  - artifact digest
  tests:
  - test_release_assets_manifest
  test_status: implemented
  residual_risk: medium
  assurance_level: AL3

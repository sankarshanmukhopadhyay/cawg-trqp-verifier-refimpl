# GitHub Pages configuration — Just the Docs theme
# Built and deployed via .github/workflows/pages.yml (not the legacy
# GitHub Pages auto-builder, so remote_theme + plugin gems are available).

title: CAWG-TRQP Reference Implementation
description: >-
  Executable verifier, decision receipt, and replayable assurance evidence
  for TRQP-integrated content authenticity workflows.
url: "https://sankarshanmukhopadhyay.github.io"
baseurl: "/cawg-trqp-verifier-refimpl"

theme: just-the-docs
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# --- Just the Docs configuration ---
color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Copyright &copy; 2026 cawg-trqp-verifier-refimpl contributors. Distributed
  under the <a href="https://github.com/sankarshanmukhopadhyay/cawg-trqp-verifier-refimpl/blob/main/LICENSE">MIT License</a>.

aux_links:
  "GitHub Repository":
    - "https://github.com/sankarshanmukhopadhyay/cawg-trqp-verifier-refimpl"
  "Latest Release":
    - "https://github.com/sankarshanmukhopadhyay/cawg-trqp-verifier-refimpl/releases/latest"
aux_links_new_tab: true

callouts:
  important:
    title: Important
    color: red
  note:
    title: Note
    color: blue
  evidence:
    title: Evidence
    color: green

# --- Site build scope ---
# Only the repository documentation surface is rendered. Source code,
# tests, environments, and raw data payloads are excluded from the Jekyll
# build; they remain available for browsing directly in the repository.
exclude:
  - .venv
  - venv
  - tests
  - src
  - conformance
  - data
  - examples
  - fixtures
  - profiles
  - schemas
  - scripts
  - release-assets
  - issues
  - requirements.txt
  - requirements-lock.txt
  - pyproject.toml
  - Makefile
  - Dockerfile
  - docker-compose.yml
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.gemspec"
  - GITHUB_RELEASE_TEMPLATE.md

include:
  - QUICKSTART.md
  - GOVERNANCE.md
  - ROADMAP.md
  - CHANGELOG.md
  - SECURITY.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - CITATION.cff
